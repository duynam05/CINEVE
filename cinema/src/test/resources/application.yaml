spring:
  datasource:
    url: jdbc:h2:mem:cineve_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

app:
  cors:
    allowed-origins: http://localhost:5173
  bootstrap:
    admin:
      enabled: false

jwt:
  signer-key: 0123456789012345678901234567890123456789012345678901234567890123
  valid-duration: 86400
